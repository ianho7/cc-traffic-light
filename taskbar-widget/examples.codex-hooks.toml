# Codex lifecycle hooks inline TOML example.
# Source: OpenAI Codex Hooks docs. Codex can also load an equivalent hooks.json.
# This is the main Codex state-source candidate; `notify` is only a low-fidelity
# compatibility notification path.
#
# Before relying on this:
# - confirm the local Codex version supports hooks;
# - ensure [features].hooks is not disabled;
# - review/trust the hook via /hooks if Codex marks it untrusted;
# - first run sample mode or a dump hook to verify the real payload shape.
#
# Build first:
#   cd D:\project\cc-traffic-light\taskbar-widget
#   cargo build

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"
[[hooks.SessionStart.hooks]]
type = "command"
command = 'D:\project\cc-traffic-light\taskbar-widget\target\debug\taskbar_widget_hook.exe codex SessionStart'
command_windows = 'D:\project\cc-traffic-light\taskbar-widget\target\debug\taskbar_widget_hook.exe codex SessionStart'

